<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especificações — Caetano Sales Force</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @font-face { font-family: 'BMWTypeNext'; src: url('https://cdn.jsdelivr.net/gh/djore4/Caetano@main/fonts/BMWTypeNextLatin-Regular.otf') format('opentype'); font-weight: 400; }
        @font-face { font-family: 'BMWTypeNext'; src: url('https://cdn.jsdelivr.net/gh/djore4/Caetano@main/fonts/BMWTypeNextLatin-Bold.otf') format('opentype'); font-weight: 700; }
        @font-face { font-family: 'BMWTypeNext'; src: url('https://cdn.jsdelivr.net/gh/djore4/Caetano@main/fonts/BMWTypeNextLatin-Light.otf') format('opentype'); font-weight: 300; }

        body { font-family: 'BMWTypeNext', 'Helvetica Neue', Arial, sans-serif; letter-spacing: -0.01em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Filtro série */
        .serie-btn { transition: all .15s; cursor: pointer; border: 1.5px solid #D1D5DB; background: #fff; color: #374151; font-weight: 700; }
        .serie-btn:hover { border-color: #374151; background: #F9FAFB; }
        .serie-btn.active { background: #1F2937; color: #fff; border-color: #1F2937; }

        /* Filtro modelo */
        .modelo-btn { transition: all .15s; cursor: pointer; border: 1.5px solid #D1D5DB; background: #fff; color: #374151; font-weight: 700; }
        .modelo-btn:hover { border-color: #0066B1; color: #0066B1; }
        .modelo-btn.active { background: #1F2937; color: #fff; border-color: #1F2937; }

        /* Motorização pill */
        .mot-pill { transition: all .15s; cursor: pointer; border: 1.5px solid #D1D5DB; background: #fff; color: #374151; }
        .mot-pill:hover { border-color: #0066B1; color: #0066B1; }
        .mot-pill.active { background: #0066B1; color: #fff; border-color: #0066B1; }

        /* Tabela */
        .spec-row:nth-child(even) td { background: #F8FAFC; }
        .spec-row:hover td { background: #EFF6FF !important; }
        .spec-row td { transition: background .1s; }

        /* Animações */
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeSlideIn .2s ease both; }

        /* Shimmer */
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 400px 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }

        /* Search input */
        .search-input:focus { outline: none; border-color: #0066B1; }


    </style>
    <script>tailwind.config = { theme: { extend: { colors: { bmw: '#0066B1' } } } }</script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 pb-32">

    <!-- HEADER -->

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <h1 class="text-xl sm:text-2xl font-bold text-bmw tracking-tight uppercase">
                    Caetano <span class="text-gray-800 font-extrabold">BMW</span>
                </h1>
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg" alt="BMW" class="h-8 sm:h-11">

        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex space-x-6 overflow-x-auto no-scrollbar">
                <button onclick="mudarTab('dados')" id="tab-dados" class="px-1 py-3 text-sm font-bold border-b-2 border-bmw text-bmw uppercase tracking-widest whitespace-nowrap">Dados Técnicos</button>
                <button onclick="mudarTab('opcionais')" id="tab-opcionais" class="px-1 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 uppercase tracking-widest whitespace-nowrap">Opcionais</button>
            </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg" alt="BMW" class="h-7 flex-shrink-0 hidden sm:block">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>

            <!-- PASSO 2: Motorizações -->

                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">

                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Motorização</p>

                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Especificações</p>

                </div>

                <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                    <div class="overflow-x-auto no-scrollbar">

                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Preço c/ IVA</p>
                        <p id="op-modal-preco-iva" class="text-xl font-black text-bmw mt-0.5"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Preço s/ IVA</p>
                        <p id="op-modal-preco-siva" class="text-sm font-bold text-gray-600 mt-0.5"></p>

                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Disponibilidade</p>
                    <div id="op-modal-disponib" class="flex flex-wrap gap-2"></div>
                </div>

                <div id="op-modal-desc-wrap" class="hidden">

                    <p id="op-modal-desc" class="text-sm text-gray-700 leading-relaxed whitespace-pre-line"></p>
                </div>

                <div id="op-modal-regras-wrap" class="hidden">

    <!-- BARRA FLUTUANTE MOBILE -->
    <div id="compare-bar" class="hidden fixed bottom-0 left-0 right-0 z-30 bg-white border-t-2 border-bmw shadow-2xl px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">
            <div class="min-w-0">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">A ver</p>
                <p class="text-xs font-bold text-gray-800 truncate" id="compare-bar-label"></p>
            </div>
            <button onclick="scrollParaTabela()" class="bg-bmw text-white text-xs font-bold px-5 py-2.5 rounded-lg uppercase tracking-widest flex-shrink-0">
                Ver Tabela ↓
            </button>
        </div>
    </div>

    <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://lhznwlfovoifvoxruqcj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoem53bGZvdm9pZnZveHJ1cWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTkzMDQsImV4cCI6MjA5MjQ5NTMwNH0.3rJYpsuFic-2Hd88ce-8f5DCZgwM5zCfYKt_gKOzhio';

    // ── AGRUPAMENTO POR SÉRIE ─────────────────────────────────────────────────
    // Regras: o nome do modelo é analisado para determinar a série
    const SERIES = [
        { label: '1', match: n => /série 1|series 1|\bm135\b|\bm140\b/i.test(n) },
        { label: '2', match: n => /série 2|series 2|\bm2\b/i.test(n) },
        { label: '3', match: n => /série 3|series 3|\bm3\b/i.test(n) },
        { label: '4', match: n => /série 4|series 4|\bm4\b|\bi4\b/i.test(n) },
        { label: '5', match: n => /série 5|series 5|\bm5\b/i.test(n) },
        { label: '7', match: n => /série 7|series 7/i.test(n) },
        { label: 'X', match: n => /\bx1\b|\bx2\b|\bx3\b|\bx4\b|\bx5\b|\bx6\b|\bx7\b|\bxm\b|\bix\b|\bix3\b|\bix1\b|\bix2\b/i.test(n) },
        { label: 'Z', match: n => /\bz4\b/i.test(n) },
    ];

    function getSerie(nome) {
        for (const s of SERIES) {
            if (s.match(nome)) return s.label;
        }
        return 'Outros';
    }

    // ── ESTADO ────────────────────────────────────────────────────────────────
    let sb, todosModelos = [], serieAtiva = null, modeloAtivo = null;
    let motorizacoesDoModelo = [], motSelecionadas = [], specsCache = {};

    // ── ARRANQUE ──────────────────────────────────────────────────────────────
    window.onload = async () => {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await sb.from('modelos').select('id, codigo, nome').order('nome');
        if (error) { mostrarErro(error.message); return; }
        todosModelos = data || [];
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('conteudo-dados').classList.remove('hidden');
        renderizarSeries(todosModelos);
    };

    // ── RENDER: SÉRIES ────────────────────────────────────────────────────────
    function renderizarSeries(modelos) {
        // Descobrir séries presentes
        const seriesPresentes = new Set(modelos.map(m => getSerie(m.nome)));
        const ordemSeries = ['1','2','3','4','5','7','X','Z','Outros'];
        const cont = document.getElementById('filtro-series');

        let html = '';
        ordemSeries.forEach(s => {
            if (!seriesPresentes.has(s)) return;
            const isActive = serieAtiva === s;
            html += `<button class="serie-btn px-4 sm:px-6 py-2 rounded-md text-sm ${isActive ? 'active' : ''}"
                onclick="selecionarSerie('${s}')">${s}</button>`;
        });
        // Botão Todos
        html += `<button class="serie-btn px-4 sm:px-6 py-2 rounded-md text-sm ${serieAtiva === 'Todos' ? 'active' : ''}"
            onclick="selecionarSerie('Todos')">Todos</button>`;
        cont.innerHTML = html;
    }

    // ── SELECIONAR SÉRIE ──────────────────────────────────────────────────────
    function selecionarSerie(serie) {
        serieAtiva = serie;
        modeloAtivo = null;
        motSelecionadas = [];
        specsCache = {};

        renderizarSeries(todosModelos);

        // Filtrar modelos da série
        const modelosDaSerie = serie === 'Todos'
            ? todosModelos
            : todosModelos.filter(m => getSerie(m.nome) === serie);

        // Mostrar filtro nível 2
        const wrap = document.getElementById('filtro-modelos-wrap');
        const cont = document.getElementById('filtro-modelos');

        if (modelosDaSerie.length > 0) {
            cont.innerHTML = modelosDaSerie.map(m => `
                <button class="modelo-btn px-4 py-2 rounded-md text-xs"
                    id="mbtn-${m.id}"
                    onclick="selecionarModelo('${m.id}', '${escapar(m.nome)}')">
                    ${m.nome}
                </button>`).join('');

            wrap.classList.remove('hidden');
        } else {
            wrap.classList.add('hidden');
        }

        // Esconder passos seguintes
        document.getElementById('passo-motorizacao').classList.add('hidden');
        document.getElementById('passo-specs').classList.add('hidden');
        document.getElementById('compare-bar').classList.add('hidden');
    }

    // ── SELECIONAR MODELO ─────────────────────────────────────────────────────
    async function selecionarModelo(id, nome) {
        modeloAtivo = { id, nome };
        motSelecionadas = [];
        specsCache = {};

        // Atualizar botões
        document.querySelectorAll('.modelo-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('mbtn-' + id);
        if (btn) btn.classList.add('active');

        // Label
        document.getElementById('modelo-label').innerText = nome;

        // Mostrar passo 2 com shimmer
        const passeMot = document.getElementById('passo-motorizacao');
        passeMot.classList.remove('hidden');
        document.getElementById('grid-motorizacoes').innerHTML = `
            <div class="shimmer h-9 w-24 rounded-full"></div>
            <div class="shimmer h-9 w-32 rounded-full"></div>
            <div class="shimmer h-9 w-20 rounded-full"></div>`;

        document.getElementById('passo-specs').classList.add('hidden');
        document.getElementById('compare-bar').classList.add('hidden');

        const { data, error } = await sb
            .from('motorizacoes')
            .select('id, codigo, nome_visual')
            .eq('modelo_id', id)
            .order('codigo');

        if (error) { mostrarErro(error.message); return; }
        motorizacoesDoModelo = data || [];
        renderizarPills();
        passeMot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }



    // ── PILLS DE MOTORIZAÇÃO ──────────────────────────────────────────────────
    function renderizarPills() {
        document.getElementById('grid-motorizacoes').innerHTML = motorizacoesDoModelo.map(m => {
            const sel = motSelecionadas.includes(m.id);
            return `<button class="mot-pill rounded-full px-4 py-2 text-xs font-bold shadow-sm ${sel ? 'active' : ''}"
                onclick="toggleMot('${m.id}')">
                ${m.nome_visual || m.codigo}
            </button>`;
        }).join('');
    }

    // ── TOGGLE MOTORIZAÇÃO ────────────────────────────────────────────────────
    async function toggleMot(id) {
        if (motSelecionadas.includes(id)) {
            motSelecionadas = motSelecionadas.filter(x => x !== id);
        } else {
            if (motSelecionadas.length >= 4) { alert('Máximo de 4 motorizações para comparar.'); return; }
            motSelecionadas.push(id);
            if (!specsCache[id]) await carregarSpecs(id);
        }
        renderizarPills();
        renderizarTabela();
        atualizarCompareBar();
    }

    // ── CARREGAR SPECS ────────────────────────────────────────────────────────
    async function carregarSpecs(motId) {
        const { data } = await sb
            .from('especificacoes')
            .select('chave, valor')
            .eq('motorizacao_id', motId);
        if (data) {
            specsCache[motId] = {};
            data.forEach(r => { specsCache[motId][r.chave] = r.valor; });
        }
    }

    // ── RENDER TABELA ─────────────────────────────────────────────────────────
    function renderizarTabela() {
        const passo = document.getElementById('passo-specs');
        if (motSelecionadas.length === 0) { passo.classList.add('hidden'); return; }
        passo.classList.remove('hidden');

        const motsInfo = motSelecionadas.map(id =>
            motorizacoesDoModelo.find(m => m.id === id) || { id, nome_visual: id, codigo: id }
        );

        // Recolher chaves únicas (preservando ordem)
        const todasChaves = [];
        motSelecionadas.forEach(id => {
            if (specsCache[id]) Object.keys(specsCache[id]).forEach(k => { if (!todasChaves.includes(k)) todasChaves.push(k); });
        });

        const colW = Math.floor(58 / motsInfo.length);

        // THEAD
        document.getElementById('tabela-thead').innerHTML = `
        <tr class="border-b-2 border-gray-100">
            <th class="px-4 sm:px-5 py-4 text-left text-[10px] font-black text-gray-400 uppercase tracking-widest bg-gray-50 sticky left-0 z-10" style="width:42%">
                Especificação
            </th>
            ${motsInfo.map(m => `
            <th class="px-3 sm:px-5 py-4 text-left bg-gray-50 border-l border-gray-100" style="width:${colW}%">
                <p class="text-xs font-black text-bmw leading-tight">${m.nome_visual || m.codigo}</p>
                <p class="text-[10px] text-gray-400 font-mono mt-0.5">${m.codigo}</p>
            </th>`).join('')}
        </tr>`;

        // TBODY
        if (todasChaves.length === 0) {
            document.getElementById('tabela-tbody').innerHTML =
                `<tr><td colspan="${1 + motsInfo.length}" class="text-center text-sm text-gray-400 py-12">Sem especificações.</td></tr>`;
            return;
        }

        document.getElementById('tabela-tbody').innerHTML = todasChaves.map((chave, i) => {
            const valores = motsInfo.map(m => {
                let v = specsCache[m.id]?.[chave] ?? '—';
                return v;
            });
            const todosIguais = valores.every(v => v === valores[0]);

            return `
            <tr class="spec-row border-b border-gray-100">
                <td class="px-4 sm:px-5 py-3 text-xs font-medium text-gray-600 leading-snug sticky left-0 bg-inherit">${chave}</td>
                ${valores.map(v => `
                <td class="px-3 sm:px-5 py-3 text-xs font-bold border-l border-gray-100 leading-snug ${v === '—' ? 'text-gray-300' : (!todosIguais ? 'text-bmw' : 'text-gray-800')}">
                    ${v}
                </td>`).join('')}
            </tr>`;
        }).join('');

        passo.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }



    // ── PESQUISA ──────────────────────────────────────────────────────────────
    function pesquisar() {
        const q = document.getElementById('pesquisa').value.toLowerCase().trim();
        const wrap = document.getElementById('filtro-modelos-wrap');
        const cont = document.getElementById('filtro-modelos');

        if (!q) {
            // Sem pesquisa — repõe estado normal
            wrap.classList.add('hidden');
            serieAtiva = null;
            renderizarSeries(todosModelos);
            return;
        }

        const filtrados = todosModelos.filter(m =>
            m.nome.toLowerCase().includes(q) || m.codigo.toLowerCase().includes(q)
        );

        // Desativar série selecionada
        serieAtiva = null;
        renderizarSeries(todosModelos);

        // Mostrar resultados no nível 2
        if (filtrados.length === 0) {
            cont.innerHTML = '<p class="text-xs text-gray-400 font-bold py-2">Nenhum modelo encontrado.</p>';
        } else {
            cont.innerHTML = filtrados.map(m => `
                <button class="modelo-btn px-4 py-2 rounded-md text-xs"
                    id="mbtn-${m.id}"
                    onclick="selecionarModelo('${m.id}', '${escapar(m.nome)}')">
                    ${m.nome}
                </button>`).join('');
        }
        wrap.classList.remove('hidden');
    }

    // ── COMPARE BAR ───────────────────────────────────────────────────────────
    function atualizarCompareBar() {
        const bar = document.getElementById('compare-bar');
        if (motSelecionadas.length > 0) {
            bar.classList.remove('hidden');
            document.getElementById('compare-bar-label').innerText = motSelecionadas
                .map(id => motorizacoesDoModelo.find(m => m.id === id)?.nome_visual || id)
                .join(' · ');
        } else {
            bar.classList.add('hidden');
        }
    }

    function scrollParaTabela() {
        document.getElementById('passo-specs')?.scrollIntoView({ behavior: 'smooth' });
    }

    // ── LIMPAR ────────────────────────────────────────────────────────────────
    function limparTudo() {
        motSelecionadas = [];
        specsCache = {};
        renderizarPills();
        renderizarTabela();
        atualizarCompareBar();
    }

    // ── UTILITÁRIOS ───────────────────────────────────────────────────────────
    function mostrarErro(msg) {
        document.getElementById('loading-state').classList.add('hidden');
        const el = document.getElementById('error-state');
        el.classList.remove('hidden');
        el.innerText = '⚠️ ' + msg;
    }

    function escapar(s) { return (s||'').replace(/'/g, "\\'"); }

        // ══════════════════════════════════════════════════════════
        // TABS
        // ══════════════════════════════════════════════════════════
        function mudarTab(tab) {
            ['dados','opcionais'].forEach(t => {
                document.getElementById('conteudo-' + t).classList.add('hidden');
                const b = document.getElementById('tab-' + t);
                b.classList.remove('border-bmw','text-bmw');
                b.classList.add('border-transparent','text-gray-400');
            });
            document.getElementById('conteudo-' + tab).classList.remove('hidden');
            const ab = document.getElementById('tab-' + tab);
            ab.classList.add('border-bmw','text-bmw');
            ab.classList.remove('border-transparent','text-gray-400');
            if (tab === 'opcionais' && opTodosModelos.length === 0) opCarregarModelos();
        }

        // ══════════════════════════════════════════════════════════
        // OPCIONAIS
        // ══════════════════════════════════════════════════════════
        let opTodosModelos = [];
        let opSerieAtiva = null;
        let opModeloAtivo = null;
        let opMotAtiva = null;
        let opTodasMots = [];
        let opTodosOpcionais = [];
        let opSecaoAtiva = 'Todas';
        let opModalData = null;

        const OP_SERIES = [
            {label:'1', fn:n=>/série 1|series 1|m135|m140/i.test(n)},
            {label:'2', fn:n=>/série 2|series 2|\bm2\b/i.test(n)},
            {label:'3', fn:n=>/série 3|series 3|\bm3\b/i.test(n)},
            {label:'4', fn:n=>/série 4|series 4|\bm4\b|\bi4\b/i.test(n)},
            {label:'5', fn:n=>/série 5|series 5|\bm5\b/i.test(n)},
            {label:'7', fn:n=>/série 7|series 7/i.test(n)},
            {label:'X', fn:n=>/\bx1\b|\bx2\b|\bx3\b|\bx4\b|\bx5\b|\bx6\b|\bx7\b|\bxm\b|\bix\b|\bix3\b/i.test(n)},
            {label:'Z', fn:n=>/\bz4\b/i.test(n)},
        ];
        function opGetSerie(n){for(const s of OP_SERIES)if(s.fn(n))return s.label;return 'Outros';}

        async function opCarregarModelos() {
            const {data} = await sb.from('op_modelos').select('id,codigo,nome').order('nome');
            opTodosModelos = data || [];
            opRenderSeries();
        }

        function opRenderSeries(lista) {
            lista = lista || opTodosModelos;
            const presentes = new Set(lista.map(m => opGetSerie(m.nome)));
            const ordem = ['1','2','3','4','5','7','X','Z','Outros'];
            document.getElementById('op-filtro-series').innerHTML =
                ordem.filter(s => presentes.has(s)).map(s =>
                    `<button class="serie-btn px-5 py-2 rounded-md text-sm ${opSerieAtiva===s?'active':''}" onclick="opClicarSerie('${s}')">${s}</button>`
                ).join('');
        }

        function opClicarSerie(serie) {
            opSerieAtiva = serie;
            opModeloAtivo = null;
            opMotAtiva = null;
            opRenderSeries();
            const modelos = opTodosModelos.filter(m => opGetSerie(m.nome) === serie);
            document.getElementById('op-filtro-modelos').innerHTML = modelos.map(m =>
                `<button class="modelo-btn px-4 py-2 rounded-md text-xs" id="op-mb-${m.id}" onclick="opClicarModelo('${m.id}','${escapar(m.nome)}')">${m.nome}</button>`
            ).join('');
            document.getElementById('op-filtro-modelos-wrap').classList.remove('hidden');
            document.getElementById('op-passo-mot').classList.add('hidden');
            document.getElementById('op-passo-lista').classList.add('hidden');
        }

        async function opClicarModelo(id, nome) {
            opModeloAtivo = {id, nome};
            opMotAtiva = null;
            document.querySelectorAll('[id^="op-mb-"]').forEach(b => b.classList.remove('active'));
            document.getElementById('op-mb-' + id)?.classList.add('active');
            document.getElementById('op-modelo-label').innerText = nome;
            document.getElementById('op-grid-mots').innerHTML = '<span class="text-xs text-gray-400">A carregar...</span>';
            document.getElementById('op-passo-mot').classList.remove('hidden');
            document.getElementById('op-passo-lista').classList.add('hidden');
            const {data} = await sb.from('op_motorizacoes').select('id,nome').eq('modelo_id', id).order('col_index');
            // Excluir entradas que não são motorizações reais
            opTodasMots = (data || []).filter(m => 
                !m.nome.includes('Recomendado') && 
                !m.nome.includes('IVA') && 
                !m.nome.includes('PVP') &&
                m.nome.trim() !== ''
            );
            opRenderMots();
        }

        function opRenderMots() {
            document.getElementById('op-grid-mots').innerHTML = opTodasMots.map(m =>
                `<button class="mot-pill rounded-full px-4 py-2 text-xs font-bold ${opMotAtiva===m.id?'active':''}"
                    onclick="opClicarMot('${m.id}','${escapar(m.nome)}')">${m.nome}</button>`
            ).join('');
        }

        async function opClicarMot(id, nome) {
            opMotAtiva = id;
            opRenderMots();
            document.getElementById('op-passo-lista').classList.remove('hidden');
            document.getElementById('op-lista').innerHTML = '<p class="text-xs text-gray-400 py-4 text-center">A carregar opcionais...</p>';

            // Carregar TODOS os opcionais desta motorização
            let allData = [];
            let from = 0;
            const pageSize = 1000;
            while (true) {
                const {data, error} = await sb
                    .from('op_disponibilidade')
                    .select('tipo, op_opcionais(id,codigo,nome,preco_iva,preco_siva,descricao,regras,op_secoes(nome))')
                    .eq('motorizacao_id', id)
                    .range(from, from + pageSize - 1);
                if (!data || data.length === 0) break;
                allData = allData.concat(data);
                if (data.length < pageSize) break;
                from += pageSize;
            }

            opTodosOpcionais = allData.map(d => ({
                ...d.op_opcionais,
                secao: d.op_opcionais?.op_secoes?.nome || 'Outros',
                tipo: d.tipo
            }));

            opSecaoAtiva = 'Todas';
            opRenderSecoes();
            opRenderLista();
        }

        function opRenderSecoes() {
            const raw = [...new Set(opTodosOpcionais.map(o => o.secao).filter(Boolean))];
            // Sort sections numerically (e.g. "1. Segurança" before "2. Pintura")
            raw.sort((a, b) => {
                const na = parseFloat(a.match(/^[\d.]+/)?.[0] || '999');
                const nb = parseFloat(b.match(/^[\d.]+/)?.[0] || '999');
                return na - nb;
            });
            const secoes = ['Todas', ...raw];
            document.getElementById('op-filtro-secoes').innerHTML = secoes.map(s =>
                `<button class="serie-btn px-4 py-1.5 rounded-md text-xs ${opSecaoAtiva===s?'active':''}"
                    onclick="opFiltrarSecao('${escapar(s)}')">${s}</button>`
            ).join('');
        }

        function opFiltrarSecao(secao) {
            opSecaoAtiva = secao;
            opRenderSecoes();
            opRenderLista();
        }

        function opRenderLista() {
            const lista = opSecaoAtiva === 'Todas'
                ? opTodosOpcionais
                : opTodosOpcionais.filter(o => o.secao === opSecaoAtiva);

            if (lista.length === 0) {
                document.getElementById('op-lista').innerHTML = '<p class="text-xs text-gray-400 py-8 text-center font-bold">Nenhum opcional encontrado.</p>';
                return;
            }

            const badgeTipo = (tipo) => {
                if (tipo === 'serie') return '<span class="px-2 py-0.5 rounded-full text-xs font-black bg-gray-800 text-white">◼ Série</span>';
                if (tipo === 'opcional') return '<span class="px-2 py-0.5 rounded-full text-xs font-black bg-blue-100 text-bmw border border-blue-200">◻ Opcional</span>';
                return '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-gray-100 text-gray-400">N/D</span>';
            };

            document.getElementById('op-lista').innerHTML = lista.map(o =>
                `<div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex items-center justify-between gap-3 cursor-pointer hover:border-bmw hover:shadow-sm transition-all"
                    onclick="opAbrirModal('${o.id}')">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-0.5 flex-wrap">
                            <span class="text-xs font-black text-bmw font-mono">${o.codigo}</span>
                            ${badgeTipo(o.tipo)}
                            ${o.preco_iva > 0 ? `<span class="text-xs font-bold text-gray-600">${Number(o.preco_iva).toLocaleString('pt-PT',{minimumFractionDigits:2})} €</span>` : (o.preco_iva === 0 ? '<span class="text-xs font-bold text-green-600">Grátis</span>' : '')}
                        </div>
                        <p class="text-sm font-bold text-gray-800 truncate">${o.nome}</p>
                        ${o.secao ? `<p class="text-xs text-gray-400 mt-0.5">${o.secao}</p>` : ''}
                    </div>
                    <svg class="w-4 h-4 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>`
            ).join('');
        }

        async function opAbrirModal(id) {
            const op = opTodosOpcionais.find(o => o.id === id);
            if (!op) return;

            // Carregar disponibilidade completa (todas as motorizações)
            const {data: dispData} = await sb
                .from('op_disponibilidade')
                .select('tipo, op_motorizacoes(nome)')
                .eq('opcional_id', id);

            document.getElementById('op-modal-codigo').innerText = op.codigo;
            document.getElementById('op-modal-nome').innerText = op.nome;

            // Preço
            const precoWrap = document.getElementById('op-modal-preco-wrap');
            if (op.preco_iva !== null && op.preco_iva !== undefined) {
                precoWrap.classList.remove('hidden');
                document.getElementById('op-modal-preco-iva').innerText =
                    op.preco_iva === 0 ? 'Grátis (série)' : Number(op.preco_iva).toLocaleString('pt-PT',{minimumFractionDigits:2}) + ' €';
                document.getElementById('op-modal-preco-siva').innerText =
                    op.preco_siva ? Number(op.preco_siva).toLocaleString('pt-PT',{minimumFractionDigits:2}) + ' €' : '';
            } else {
                precoWrap.classList.add('hidden');
            }

            // Disponibilidade por motorização
            const dispHtml = (dispData||[]).map(d => {
                const t = d.tipo;
                const n = d.op_motorizacoes?.nome || '';
                const cls = t === 'serie' ? 'bg-gray-800 text-white' :
                             t === 'opcional' ? 'bg-blue-100 text-bmw border border-blue-200' :
                             'bg-gray-100 text-gray-400';
                const sym = t === 'serie' ? '◼' : t === 'opcional' ? '◻' : '—';
                return `<div class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg ${cls}">
                    <span class="text-xs font-black">${sym}</span>
                    <span class="text-xs font-bold">${n}</span>
                </div>`;
            }).join('');
            document.getElementById('op-modal-disponib').innerHTML = dispHtml || '<p class="text-xs text-gray-400">Sem dados.</p>';

            // Descrição
            const descWrap = document.getElementById('op-modal-desc-wrap');
            if (op.descricao) {
                descWrap.classList.remove('hidden');
                document.getElementById('op-modal-desc').innerText = op.descricao;
            } else {
                descWrap.classList.add('hidden');
            }

            // Regras
            const regrasWrap = document.getElementById('op-modal-regras-wrap');
            if (op.regras) {
                regrasWrap.classList.remove('hidden');
                document.getElementById('op-modal-regras').innerText = op.regras;
            } else {
                regrasWrap.classList.add('hidden');
            }

            document.getElementById('op-modal').classList.remove('hidden');
            document.getElementById('op-modal').classList.add('flex');
        }

        function opFecharModal() {
            document.getElementById('op-modal').classList.add('hidden');
            document.getElementById('op-modal').classList.remove('flex');
        }

        function opLimpar() {
            opMotAtiva = null;
            opRenderMots();
            document.getElementById('op-passo-lista').classList.add('hidden');
        }

        function opPesquisar() {
            const q = document.getElementById('op-pesquisa').value.toLowerCase().trim();
            if (!q) {
                document.getElementById('op-filtro-modelos-wrap').classList.add('hidden');
                opSerieAtiva = null;
                opRenderSeries();
                return;
            }
            const f = opTodosModelos.filter(m => m.nome.toLowerCase().includes(q) || m.codigo.toLowerCase().includes(q));
            opSerieAtiva = null;
            opRenderSeries();
            document.getElementById('op-filtro-modelos').innerHTML = f.length === 0
                ? '<p class="text-xs text-gray-400">Nenhum resultado.</p>'
                : f.map(m => `<button class="modelo-btn px-4 py-2 rounded-md text-xs" id="op-mb-${m.id}" onclick="opClicarModelo('${m.id}','${escapar(m.nome)}')">${m.nome}</button>`).join('');
            document.getElementById('op-filtro-modelos-wrap').classList.remove('hidden');
        }

    </script>
</body>
</html>
