<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especificações — Caetano Sales Force</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @font-face { font-family: 'BMWTypeNext'; src: url('https://cdn.jsdelivr.net/gh/djore4/Caetano@main/fonts/BMWTypeNextLatin-Regular.otf') format('opentype'); font-weight: 400; }
        @font-face { font-family: 'BMWTypeNext'; src: url('https://cdn.jsdelivr.net/gh/djore4/Caetano@main/fonts/BMWTypeNextLatin-Bold.otf') format('opentype'); font-weight: 700; }
        @font-face { font-family: 'BMWTypeNext'; src: url('https://cdn.jsdelivr.net/gh/djore4/Caetano@main/fonts/BMWTypeNextLatin-Light.otf') format('opentype'); font-weight: 300; }

        body { font-family: 'BMWTypeNext', 'Helvetica Neue', Arial, sans-serif; letter-spacing: -0.01em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Filtro série */
        .serie-btn { transition: all .15s; cursor: pointer; border: 1.5px solid #D1D5DB; background: #fff; color: #374151; font-weight: 700; }
        .serie-btn:hover { border-color: #374151; background: #F9FAFB; }
        .serie-btn.active { background: #1F2937; color: #fff; border-color: #1F2937; }

        /* Filtro modelo */
        .modelo-btn { transition: all .15s; cursor: pointer; border: 1.5px solid #D1D5DB; background: #fff; color: #374151; font-weight: 700; }
        .modelo-btn:hover { border-color: #0066B1; color: #0066B1; }
        .modelo-btn.active { background: #1F2937; color: #fff; border-color: #1F2937; }

        /* Motorização pill */
        .mot-pill { transition: all .15s; cursor: pointer; border: 1.5px solid #D1D5DB; background: #fff; color: #374151; }
        .mot-pill:hover { border-color: #0066B1; color: #0066B1; }
        .mot-pill.active { background: #0066B1; color: #fff; border-color: #0066B1; }

        /* Tabela */
        .spec-row:nth-child(even) td { background: #F8FAFC; }
        .spec-row:hover td { background: #EFF6FF !important; }
        .spec-row td { transition: background .1s; }

        /* Animações */
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeSlideIn .2s ease both; }

        /* Shimmer */
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 400px 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }

        /* Search input */
        .search-input:focus { outline: none; border-color: #0066B1; }


    </style>
    <script>tailwind.config = { theme: { extend: { colors: { bmw: '#0066B1' } } } }</script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 pb-32">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <h1 class="text-xl sm:text-2xl font-bold text-bmw tracking-tight uppercase">
                    Caetano <span class="text-gray-800 font-extrabold">BMW</span>
                </h1>
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg" alt="BMW" class="h-8 sm:h-11">
            </div>
        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex space-x-6 overflow-x-auto no-scrollbar">
                <button onclick="mudarTab('dados')" id="tab-dados" class="px-1 py-3 text-sm font-bold border-b-2 border-bmw text-bmw uppercase tracking-widest whitespace-nowrap">Dados Técnicos</button>
                <button onclick="mudarTab('comparador')" id="tab-comparador" class="px-1 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 uppercase tracking-widest whitespace-nowrap">Comparador</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

        <!-- LOADING -->
        <div id="loading-state" class="flex items-center justify-center py-20">
            <div class="w-5 h-5 border-2 border-bmw border-t-transparent rounded-full animate-spin mr-3"></div>
            <span class="text-sm font-bold uppercase tracking-widest text-gray-400">A carregar...</span>
        </div>

        <!-- ERRO -->
        <div id="error-state" class="hidden bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-xl text-sm font-medium mb-5"></div>

        <!-- ═══════════════════════════════════════════════════════ -->
        <!-- TAB: DADOS TÉCNICOS                                     -->
        <!-- ═══════════════════════════════════════════════════════ -->
        <div id="conteudo-dados" class="hidden">

            <!-- BARRA DE PESQUISA -->
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm px-4 py-3 mb-5 flex items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/BMW_logo_%28gray%29.svg" alt="BMW" class="h-7 flex-shrink-0 hidden sm:block">
                <div class="relative flex-1">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
                    </svg>
                    <input type="text" id="pesquisa" placeholder="Inserir código ou palavra para pesquisa"
                        oninput="pesquisar()"
                        class="search-input w-full border border-gray-200 rounded-lg pl-9 pr-4 py-2.5 text-sm bg-gray-50">
                </div>
            </div>

            <!-- FILTRO NÍVEL 1: Séries -->
            <div class="bg-white border border-gray-200 rounded-xl shadow-sm px-4 sm:px-5 py-4 mb-3">
                <div class="flex flex-wrap gap-2" id="filtro-series"></div>
            </div>

            <!-- FILTRO NÍVEL 2: Modelos -->
            <div id="filtro-modelos-wrap" class="bg-white border border-gray-200 rounded-xl shadow-sm px-4 sm:px-5 py-4 mb-5 hidden fade-in">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Outras categorias</p>
                <div class="flex flex-wrap gap-2" id="filtro-modelos"></div>
            </div>

            <!-- PASSO 2: Motorizações -->
            <div id="passo-motorizacao" class="hidden fade-in mb-5">
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm px-4 sm:px-5 py-4">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full bg-bmw text-white text-[10px] font-black flex items-center justify-center">2</div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Motorização</p>
                            <span id="modelo-label" class="text-xs text-bmw font-bold bg-blue-50 border border-blue-100 px-2 py-0.5 rounded-full"></span>
                        </div>
                        <button onclick="limparTudo()" class="text-[10px] font-bold text-gray-400 hover:text-red-500 uppercase tracking-widest">Limpar</button>
                    </div>
                    <div id="grid-motorizacoes" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <!-- PASSO 3: Tabela -->
            <div id="passo-specs" class="hidden fade-in">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-6 h-6 rounded-full bg-bmw text-white text-[10px] font-black flex items-center justify-center">3</div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Especificações</p>
                    <span class="text-[10px] text-gray-400 hidden sm:inline">— valores a azul indicam diferenças</span>
                </div>
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                    <div class="overflow-x-auto no-scrollbar">
                        <table id="tabela-specs" class="w-full text-sm min-w-[400px]">
                            <thead id="tabela-thead"></thead>
                            <tbody id="tabela-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════════════════ -->
        <!-- TAB: COMPARADOR                                         -->
        <!-- ═══════════════════════════════════════════════════════ -->
        <div id="conteudo-comparador" class="hidden">

            <!-- Instrução -->
            <div class="bg-blue-50 border border-blue-100 rounded-xl px-5 py-3 mb-5 flex items-center gap-3">
                <svg class="w-4 h-4 text-bmw flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <p class="text-xs font-bold text-bmw">Selecione até 4 modelos e escolha uma motorização de cada para comparar lado a lado.</p>
            </div>

            <!-- Slots de seleção -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6" id="comp-slots">
                <!-- preenchido dinamicamente -->
            </div>

            <!-- Tabela comparativa -->
            <div id="comp-tabela-wrap" class="hidden fade-in">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-6 h-6 rounded-full bg-bmw text-white text-[10px] font-black flex items-center justify-center">✓</div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Comparação</p>
                        <span class="text-[10px] text-gray-400 hidden sm:inline">— valores a azul indicam diferenças</span>
                    </div>
                    <button onclick="limparComparador()" class="text-[10px] font-bold text-gray-400 hover:text-red-500 uppercase tracking-widest">Limpar tudo</button>
                </div>
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                    <div class="overflow-x-auto no-scrollbar">
                        <table class="w-full text-sm" style="min-width: 500px;">
                            <thead id="comp-thead"></thead>
                            <tbody id="comp-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL: Seleção de modelo para comparador -->
    <div id="modal-comp" class="fixed inset-0 bg-slate-900/70 z-50 hidden flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md flex flex-col overflow-hidden" style="max-height: 85vh;">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-base font-black text-gray-800 uppercase tracking-widest">Escolher Modelo</h2>
                <button onclick="fecharModalComp()" class="text-gray-400 hover:text-red-500 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="px-4 py-3 border-b border-gray-100">
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
                    <input type="text" id="comp-pesquisa" placeholder="Pesquisar modelo..." oninput="pesquisarModalComp()"
                        class="w-full border border-gray-200 rounded-lg pl-9 pr-4 py-2.5 text-sm bg-gray-50 outline-none focus:border-bmw">
                </div>
            </div>
            <input type="hidden" id="modal-comp-slot" value="0">
            <div class="overflow-y-auto p-3 space-y-1.5 flex-1 no-scrollbar" id="comp-lista-modelos"></div>
        </div>
    </div>

    <!-- BARRA FLUTUANTE MOBILE -->
    <div id="compare-bar" class="hidden fixed bottom-0 left-0 right-0 z-30 bg-white border-t-2 border-bmw shadow-2xl px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">
            <div class="min-w-0">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">A ver</p>
                <p class="text-xs font-bold text-gray-800 truncate" id="compare-bar-label"></p>
            </div>
            <button onclick="scrollParaTabela()" class="bg-bmw text-white text-xs font-bold px-5 py-2.5 rounded-lg uppercase tracking-widest flex-shrink-0">Ver Tabela ↓</button>
        </div>
    </div>

    <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://lhznwlfovoifvoxruqcj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoem53bGZvdm9pZnZveHJ1cWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTkzMDQsImV4cCI6MjA5MjQ5NTMwNH0.3rJYpsuFic-2Hd88ce-8f5DCZgwM5zCfYKt_gKOzhio';

    // ── TABS ──────────────────────────────────────────────────────────────────
    function mudarTab(tab) {
        ['dados','comparador'].forEach(t => {
            document.getElementById('conteudo-' + t).classList.add('hidden');
            document.getElementById('tab-' + t).classList.remove('border-bmw','text-bmw');
            document.getElementById('tab-' + t).classList.add('border-transparent','text-gray-400');
        });
        document.getElementById('conteudo-' + tab).classList.remove('hidden');
        document.getElementById('tab-' + tab).classList.add('border-bmw','text-bmw');
        document.getElementById('tab-' + tab).classList.remove('border-transparent','text-gray-400');
        if (tab === 'comparador') renderizarSlots();
    }

    // ── AGRUPAMENTO POR SÉRIE ─────────────────────────────────────────────────
    // Regras: o nome do modelo é analisado para determinar a série
    const SERIES = [
        { label: '1', match: n => /série 1|series 1|\bm135\b|\bm140\b/i.test(n) },
        { label: '2', match: n => /série 2|series 2|\bm2\b/i.test(n) },
        { label: '3', match: n => /série 3|series 3|\bm3\b/i.test(n) },
        { label: '4', match: n => /série 4|series 4|\bm4\b|\bi4\b/i.test(n) },
        { label: '5', match: n => /série 5|series 5|\bm5\b/i.test(n) },
        { label: '7', match: n => /série 7|series 7/i.test(n) },
        { label: 'X', match: n => /\bx1\b|\bx2\b|\bx3\b|\bx4\b|\bx5\b|\bx6\b|\bx7\b|\bxm\b|\bix\b|\bix3\b|\bix1\b|\bix2\b/i.test(n) },
        { label: 'Z', match: n => /\bz4\b/i.test(n) },
    ];

    function getSerie(nome) {
        for (const s of SERIES) {
            if (s.match(nome)) return s.label;
        }
        return 'Outros';
    }

    // ── ESTADO ────────────────────────────────────────────────────────────────
    let sb, todosModelos = [], serieAtiva = null, modeloAtivo = null;
    let motorizacoesDoModelo = [], motSelecionadas = [], specsCache = {};

    // ── ARRANQUE ──────────────────────────────────────────────────────────────
    window.onload = async () => {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await sb.from('modelos').select('id, codigo, nome').order('nome');
        if (error) { mostrarErro(error.message); return; }
        todosModelos = data || [];
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('conteudo-dados').classList.remove('hidden');
        renderizarSeries(todosModelos);
        renderizarSlots();
    };

    // ── RENDER: SÉRIES ────────────────────────────────────────────────────────
    function renderizarSeries(modelos) {
        // Descobrir séries presentes
        const seriesPresentes = new Set(modelos.map(m => getSerie(m.nome)));
        const ordemSeries = ['1','2','3','4','5','7','X','Z','Outros'];
        const cont = document.getElementById('filtro-series');

        let html = '';
        ordemSeries.forEach(s => {
            if (!seriesPresentes.has(s)) return;
            const isActive = serieAtiva === s;
            html += `<button class="serie-btn px-4 sm:px-6 py-2 rounded-md text-sm ${isActive ? 'active' : ''}"
                onclick="selecionarSerie('${s}')">${s}</button>`;
        });
        // Botão Todos
        html += `<button class="serie-btn px-4 sm:px-6 py-2 rounded-md text-sm ${serieAtiva === 'Todos' ? 'active' : ''}"
            onclick="selecionarSerie('Todos')">Todos</button>`;
        cont.innerHTML = html;
    }

    // ── SELECIONAR SÉRIE ──────────────────────────────────────────────────────
    function selecionarSerie(serie) {
        serieAtiva = serie;
        modeloAtivo = null;
        motSelecionadas = [];
        specsCache = {};

        renderizarSeries(todosModelos);

        // Filtrar modelos da série
        const modelosDaSerie = serie === 'Todos'
            ? todosModelos
            : todosModelos.filter(m => getSerie(m.nome) === serie);

        // Mostrar filtro nível 2
        const wrap = document.getElementById('filtro-modelos-wrap');
        const cont = document.getElementById('filtro-modelos');

        if (modelosDaSerie.length > 0) {
            cont.innerHTML = modelosDaSerie.map(m => `
                <button class="modelo-btn px-4 py-2 rounded-md text-xs"
                    id="mbtn-${m.id}"
                    onclick="selecionarModelo('${m.id}', '${escapar(m.nome)}')">
                    ${m.nome}
                </button>`).join('');

            wrap.classList.remove('hidden');
        } else {
            wrap.classList.add('hidden');
        }

        // Esconder passos seguintes
        document.getElementById('passo-motorizacao').classList.add('hidden');
        document.getElementById('passo-specs').classList.add('hidden');
        document.getElementById('compare-bar').classList.add('hidden');
    }

    // ── SELECIONAR MODELO ─────────────────────────────────────────────────────
    async function selecionarModelo(id, nome) {
        modeloAtivo = { id, nome };
        motSelecionadas = [];
        specsCache = {};

        // Atualizar botões
        document.querySelectorAll('.modelo-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('mbtn-' + id);
        if (btn) btn.classList.add('active');

        // Label
        document.getElementById('modelo-label').innerText = nome;

        // Mostrar passo 2 com shimmer
        const passeMot = document.getElementById('passo-motorizacao');
        passeMot.classList.remove('hidden');
        document.getElementById('grid-motorizacoes').innerHTML = `
            <div class="shimmer h-9 w-24 rounded-full"></div>
            <div class="shimmer h-9 w-32 rounded-full"></div>
            <div class="shimmer h-9 w-20 rounded-full"></div>`;

        document.getElementById('passo-specs').classList.add('hidden');
        document.getElementById('compare-bar').classList.add('hidden');

        const { data, error } = await sb
            .from('motorizacoes')
            .select('id, codigo, nome_visual')
            .eq('modelo_id', id)
            .order('codigo');

        if (error) { mostrarErro(error.message); return; }
        motorizacoesDoModelo = data || [];
        renderizarPills();
        passeMot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }



    // ── PILLS DE MOTORIZAÇÃO ──────────────────────────────────────────────────
    function renderizarPills() {
        document.getElementById('grid-motorizacoes').innerHTML = motorizacoesDoModelo.map(m => {
            const sel = motSelecionadas.includes(m.id);
            return `<button class="mot-pill rounded-full px-4 py-2 text-xs font-bold shadow-sm ${sel ? 'active' : ''}"
                onclick="toggleMot('${m.id}')">
                ${m.nome_visual || m.codigo}
            </button>`;
        }).join('');
    }

    // ── TOGGLE MOTORIZAÇÃO ────────────────────────────────────────────────────
    async function toggleMot(id) {
        if (motSelecionadas.includes(id)) {
            motSelecionadas = motSelecionadas.filter(x => x !== id);
        } else {
            if (motSelecionadas.length >= 4) { alert('Máximo de 4 motorizações para comparar.'); return; }
            motSelecionadas.push(id);
            if (!specsCache[id]) await carregarSpecs(id);
        }
        renderizarPills();
        renderizarTabela();
        atualizarCompareBar();
    }

    // ── CARREGAR SPECS ────────────────────────────────────────────────────────
    async function carregarSpecs(motId) {
        const { data } = await sb
            .from('especificacoes')
            .select('chave, valor')
            .eq('motorizacao_id', motId);
        if (data) {
            specsCache[motId] = {};
            data.forEach(r => { specsCache[motId][r.chave] = r.valor; });
        }
    }

    // ── RENDER TABELA ─────────────────────────────────────────────────────────
    function renderizarTabela() {
        const passo = document.getElementById('passo-specs');
        if (motSelecionadas.length === 0) { passo.classList.add('hidden'); return; }
        passo.classList.remove('hidden');

        const motsInfo = motSelecionadas.map(id =>
            motorizacoesDoModelo.find(m => m.id === id) || { id, nome_visual: id, codigo: id }
        );

        // Recolher chaves únicas (preservando ordem)
        const todasChaves = [];
        motSelecionadas.forEach(id => {
            if (specsCache[id]) Object.keys(specsCache[id]).forEach(k => { if (!todasChaves.includes(k)) todasChaves.push(k); });
        });

        const colW = Math.floor(58 / motsInfo.length);

        // THEAD
        document.getElementById('tabela-thead').innerHTML = `
        <tr class="border-b-2 border-gray-100">
            <th class="px-4 sm:px-5 py-4 text-left text-[10px] font-black text-gray-400 uppercase tracking-widest bg-gray-50 sticky left-0 z-10" style="width:42%">
                Especificação
            </th>
            ${motsInfo.map(m => `
            <th class="px-3 sm:px-5 py-4 text-left bg-gray-50 border-l border-gray-100" style="width:${colW}%">
                <p class="text-xs font-black text-bmw leading-tight">${m.nome_visual || m.codigo}</p>
                <p class="text-[10px] text-gray-400 font-mono mt-0.5">${m.codigo}</p>
            </th>`).join('')}
        </tr>`;

        // TBODY
        if (todasChaves.length === 0) {
            document.getElementById('tabela-tbody').innerHTML =
                `<tr><td colspan="${1 + motsInfo.length}" class="text-center text-sm text-gray-400 py-12">Sem especificações.</td></tr>`;
            return;
        }

        document.getElementById('tabela-tbody').innerHTML = todasChaves.map((chave, i) => {
            const valores = motsInfo.map(m => {
                let v = specsCache[m.id]?.[chave] ?? '—';
                return v;
            });
            const todosIguais = valores.every(v => v === valores[0]);

            return `
            <tr class="spec-row border-b border-gray-100">
                <td class="px-4 sm:px-5 py-3 text-xs font-medium text-gray-600 leading-snug sticky left-0 bg-inherit">${chave}</td>
                ${valores.map(v => `
                <td class="px-3 sm:px-5 py-3 text-xs font-bold border-l border-gray-100 leading-snug ${v === '—' ? 'text-gray-300' : (!todosIguais ? 'text-bmw' : 'text-gray-800')}">
                    ${v}
                </td>`).join('')}
            </tr>`;
        }).join('');

        passo.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }



    // ── PESQUISA ──────────────────────────────────────────────────────────────
    function pesquisar() {
        const q = document.getElementById('pesquisa').value.toLowerCase().trim();
        const wrap = document.getElementById('filtro-modelos-wrap');
        const cont = document.getElementById('filtro-modelos');

        if (!q) {
            // Sem pesquisa — repõe estado normal
            wrap.classList.add('hidden');
            serieAtiva = null;
            renderizarSeries(todosModelos);
            return;
        }

        const filtrados = todosModelos.filter(m =>
            m.nome.toLowerCase().includes(q) || m.codigo.toLowerCase().includes(q)
        );

        // Desativar série selecionada
        serieAtiva = null;
        renderizarSeries(todosModelos);

        // Mostrar resultados no nível 2
        if (filtrados.length === 0) {
            cont.innerHTML = '<p class="text-xs text-gray-400 font-bold py-2">Nenhum modelo encontrado.</p>';
        } else {
            cont.innerHTML = filtrados.map(m => `
                <button class="modelo-btn px-4 py-2 rounded-md text-xs"
                    id="mbtn-${m.id}"
                    onclick="selecionarModelo('${m.id}', '${escapar(m.nome)}')">
                    ${m.nome}
                </button>`).join('');
        }
        wrap.classList.remove('hidden');
    }

    // ── COMPARE BAR ───────────────────────────────────────────────────────────
    function atualizarCompareBar() {
        const bar = document.getElementById('compare-bar');
        if (motSelecionadas.length > 0) {
            bar.classList.remove('hidden');
            document.getElementById('compare-bar-label').innerText = motSelecionadas
                .map(id => motorizacoesDoModelo.find(m => m.id === id)?.nome_visual || id)
                .join(' · ');
        } else {
            bar.classList.add('hidden');
        }
    }

    function scrollParaTabela() {
        document.getElementById('passo-specs')?.scrollIntoView({ behavior: 'smooth' });
    }

    // ── LIMPAR ────────────────────────────────────────────────────────────────
    function limparTudo() {
        motSelecionadas = [];
        specsCache = {};
        renderizarPills();
        renderizarTabela();
        atualizarCompareBar();
    }

    // ── COMPARADOR ────────────────────────────────────────────────────────────
    const MAX_COMP = 4;
    let compSlots = [null, null, null, null]; // cada slot: { modeloId, modeloNome, motId, motNome, specs }

    function renderizarSlots() {
        const cont = document.getElementById('comp-slots');
        cont.innerHTML = compSlots.map((slot, i) => {
            if (!slot || !slot.modeloId) {
                // Slot vazio
                return `
                <div class="bg-white border-2 border-dashed border-gray-200 rounded-xl p-4 flex flex-col items-center justify-center min-h-[160px] gap-3 cursor-pointer hover:border-bmw transition-colors"
                     onclick="abrirSeletorModelo(${i})">
                    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
                        <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest text-center">Adicionar modelo</p>
                </div>`;
            }
            if (!slot.motId) {
                // Modelo selecionado, falta motorização
                return `
                <div class="bg-white border-2 border-bmw rounded-xl p-4 flex flex-col min-h-[160px] gap-2 fade-in">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-black text-gray-800 leading-tight flex-1">${slot.modeloNome}</p>
                        <button onclick="limparSlot(${i})" class="text-gray-300 hover:text-red-400 ml-2 flex-shrink-0">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Escolha a motorização:</p>
                    <div class="flex flex-col gap-1.5 overflow-y-auto max-h-[120px] no-scrollbar" id="comp-mots-${i}">
                        <div class="shimmer h-7 w-full rounded-full"></div>
                        <div class="shimmer h-7 w-3/4 rounded-full"></div>
                    </div>
                </div>`;
            }
            // Slot completo
            return `
            <div class="bg-white border-2 border-green-400 rounded-xl p-4 flex flex-col min-h-[160px] gap-2 fade-in">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <p class="text-xs font-black text-gray-800 leading-tight">${slot.modeloNome}</p>
                        <p class="text-[11px] font-bold text-bmw mt-1">${slot.motNome}</p>
                    </div>
                    <button onclick="limparSlot(${i})" class="text-gray-300 hover:text-red-400 ml-2 flex-shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="mt-auto flex items-center gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-green-400"></div>
                    <span class="text-[10px] font-bold text-green-600 uppercase tracking-widest">Pronto</span>
                </div>
            </div>`;
        }).join('');

        // Carregar motorizações para slots com modelo mas sem mot
        compSlots.forEach((slot, i) => {
            if (slot && slot.modeloId && !slot.motId) {
                carregarMotsParaSlot(i, slot.modeloId);
            }
        });

        renderizarTabelaComparadora();
    }

    async function carregarMotsParaSlot(slotIdx, modeloId) {
        const { data } = await sb.from('motorizacoes').select('id, codigo, nome_visual').eq('modelo_id', modeloId).order('codigo');
        const cont = document.getElementById('comp-mots-' + slotIdx);
        if (!cont) return;
        cont.innerHTML = (data || []).map(m => `
            <button class="text-left px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold text-gray-700 hover:border-bmw hover:text-bmw transition-colors"
                onclick="selecionarMotComparador(${slotIdx}, '${m.id}', '${escapar(m.nome_visual || m.codigo)}')">
                ${m.nome_visual || m.codigo}
            </button>`).join('');
    }

    async function selecionarMotComparador(slotIdx, motId, motNome) {
        compSlots[slotIdx].motId = motId;
        compSlots[slotIdx].motNome = motNome;
        // Carregar specs
        const { data } = await sb.from('especificacoes').select('chave, valor').eq('motorizacao_id', motId);
        compSlots[slotIdx].specs = {};
        (data || []).forEach(r => { compSlots[slotIdx].specs[r.chave] = r.valor; });
        renderizarSlots();
    }

    function abrirSeletorModelo(slotIdx) {
        // Modal simples de seleção
        const modal = document.getElementById('modal-comp');
        document.getElementById('modal-comp-slot').value = slotIdx;
        document.getElementById('comp-pesquisa').value = '';
        renderizarListaModalComp(todosModelos);
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.getElementById('comp-pesquisa').focus();
    }

    function fecharModalComp() {
        document.getElementById('modal-comp').classList.add('hidden');
        document.getElementById('modal-comp').classList.remove('flex');
    }

    function renderizarListaModalComp(modelos) {
        document.getElementById('comp-lista-modelos').innerHTML = modelos.map(m => `
            <button class="w-full text-left px-4 py-3 rounded-xl border border-gray-100 bg-white hover:border-bmw hover:bg-blue-50 transition-colors"
                onclick="selecionarModeloComparador('${m.id}', '${escapar(m.nome)}')">
                <p class="text-sm font-black text-gray-800">${m.nome}</p>
                <p class="text-[10px] text-gray-400 font-mono mt-0.5">${m.codigo}</p>
            </button>`).join('');
    }

    function pesquisarModalComp() {
        const q = document.getElementById('comp-pesquisa').value.toLowerCase();
        const filtrados = q ? todosModelos.filter(m => m.nome.toLowerCase().includes(q) || m.codigo.toLowerCase().includes(q)) : todosModelos;
        renderizarListaModalComp(filtrados);
    }

    function selecionarModeloComparador(modeloId, modeloNome) {
        const slotIdx = parseInt(document.getElementById('modal-comp-slot').value);
        compSlots[slotIdx] = { modeloId, modeloNome, motId: null, motNome: null, specs: {} };
        fecharModalComp();
        renderizarSlots();
    }

    function limparSlot(slotIdx) {
        compSlots[slotIdx] = null;
        renderizarSlots();
    }

    function limparComparador() {
        compSlots = [null, null, null, null];
        renderizarSlots();
    }

    function renderizarTabelaComparadora() {
        const slotsCompletos = compSlots.filter(s => s && s.motId);
        const wrap = document.getElementById('comp-tabela-wrap');

        if (slotsCompletos.length < 2) { wrap.classList.add('hidden'); return; }
        wrap.classList.remove('hidden');

        // Recolher todas as chaves únicas
        const todasChaves = [];
        slotsCompletos.forEach(s => {
            Object.keys(s.specs || {}).forEach(k => { if (!todasChaves.includes(k)) todasChaves.push(k); });
        });

        const colW = Math.floor(58 / slotsCompletos.length);

        // THEAD
        document.getElementById('comp-thead').innerHTML = `
        <tr class="border-b-2 border-gray-100">
            <th class="px-4 sm:px-5 py-4 text-left text-[10px] font-black text-gray-400 uppercase tracking-widest bg-gray-50" style="width:42%">Especificação</th>
            ${slotsCompletos.map(s => `
            <th class="px-3 sm:px-5 py-4 text-left bg-gray-50 border-l border-gray-100" style="width:${colW}%">
                <p class="text-xs font-black text-bmw leading-tight">${s.modeloNome}</p>
                <p class="text-[10px] text-gray-400 font-bold mt-0.5">${s.motNome}</p>
            </th>`).join('')}
        </tr>`;

        // TBODY
        document.getElementById('comp-tbody').innerHTML = todasChaves.map((chave, i) => {
            const valores = slotsCompletos.map(s => s.specs?.[chave] ?? '—');
            const todosIguais = valores.every(v => v === valores[0]);
            return `
            <tr class="border-b border-gray-100 ${i % 2 === 0 ? 'bg-white' : 'bg-slate-50/70'} hover:bg-blue-50/40 transition-colors">
                <td class="px-4 sm:px-5 py-3 text-xs font-medium text-gray-600 leading-snug">${chave}</td>
                ${valores.map(v => `
                <td class="px-3 sm:px-5 py-3 text-xs font-bold border-l border-gray-100 leading-snug ${v === '—' ? 'text-gray-300' : (!todosIguais ? 'text-bmw' : 'text-gray-800')}">
                    ${v}
                </td>`).join('')}
            </tr>`;
        }).join('');

        wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
        document.getElementById('loading-state').classList.add('hidden');
        const el = document.getElementById('error-state');
        el.classList.remove('hidden');
        el.innerText = '⚠️ ' + msg;
    }

    function escapar(s) { return (s||'').replace(/'/g, "\\'"); }
    </script>
</body>
</html>
